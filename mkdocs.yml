site_name: sxAct
site_description: xAct Migration Experiments — tensor algebra for open-source ecosystems
repo_url: https://github.com/sashakile/sxAct
docs_dir: docs/site

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - API Reference:
      - Oracle: api/oracle.md
      - Normalize: api/normalize.md
      - Compare: api/compare.md
  - Background:
      - Differential Geometry Primer: differential-geometry-primer.md
  - Contributing: contributing.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - tables
