[[tests.operations]]
action   = "Evaluate"
store_as = "result"
[tests.operations.args]
expression = "PermMemberQ[ID, $sgs]"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "$result === True"
message   = "Expected: identity is a member of RowSymmetrySGS"

[tests.expected]
is_zero         = false
comparison_tier = 1

