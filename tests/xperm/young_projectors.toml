# ---------------------------------------------------------------------------
# Tests: YoungProjector term counts
# ---------------------------------------------------------------------------

[[tests]]
id          = "projector_sym2_terms"
description = "YoungProjector for {2}: fully symmetric on 2 indices gives 2 positive terms"

[[tests.operations]]
action   = "Evaluate"
store_as = "tab"
[tests.operations.args]
expression = "StandardTableau[{2}, {1, 2}]"

[[tests.operations]]
action   = "Evaluate"
store_as = "terms"
[tests.operations.args]
expression = "YoungProjector[$tab, 2]"

[[tests.operations]]
action   = "Evaluate"
store_as = "result"
[tests.operations.args]
expression = "length[$terms]"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "$result === 2"
message   = "Expected: 2 terms in projector for partition {2}"

[tests.expected]
is_zero         = false
comparison_tier = 1

