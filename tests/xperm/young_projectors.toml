# xperm/young_projectors.toml
# Layer 1 regression tests for Young tableaux and Young projectors.
# Tests StandardTableau construction, RowSymmetrySGS/ColAntisymmetrySGS groups,
# and the YoungProjector P_λ = Q_λ · R_λ.
# Validates against schema: tests/schema/test-schema.json
#
# NOTE: CamelCase function aliases (StandardTableau, RowSymmetrySGS, etc.) are
# used because the _wl_to_jl adapter translation strips underscores from
# snake_case function names (WL pattern notation).

[meta]
id              = "xperm/young_projectors"
description     = "Young tableaux: StandardTableau, RowSymmetrySGS, ColAntisymmetrySGS, YoungProjector (layer 1)"
tags            = ["xperm", "young", "layer:1"]
layer           = 1
oracle_is_axiom = true

# ---------------------------------------------------------------------------
# Tests: StandardTableau construction
# ---------------------------------------------------------------------------

[[tests]]
id          = "tableau_partition_2"
description = "StandardTableau({2}, {1,2}) fills one row with {1,2}"

[[tests.operations]]
action   = "Evaluate"
store_as = "tab"
[tests.operations.args]
expression = "StandardTableau[{2}, {1, 2}]"

[[tests.operations]]
action   = "Evaluate"
store_as = "result"
[tests.operations.args]
expression = "TableauPartition[$tab]"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "$result === {2}"
message   = "Expected: partition == {2}"

[tests.expected]
is_zero         = false
comparison_tier = 1

# ---------------------------------------------------------------------------

[[tests]]
id          = "tableau_filling_11"
description = "StandardTableau({1,1}, {1,2}) fills two rows: row1={1}, row2={2}"

[[tests.operations]]
action   = "Evaluate"
store_as = "tab"
[tests.operations.args]
expression = "StandardTableau[{1, 1}, {1, 2}]"

[[tests.operations]]
action   = "Evaluate"
store_as = "result"
[tests.operations.args]
expression = "TableauFilling[$tab]"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "$result === {{1}, {2}}"
message   = "Expected: filling == {{1}, {2}}"

[tests.expected]
is_zero         = false
comparison_tier = 1

# ---------------------------------------------------------------------------

[[tests]]
id          = "tableau_filling_hook_21"
description = "StandardTableau({2,1}, {1,2,3}) gives hook shape: row1={1,2}, row2={3}"

[[tests.operations]]
action   = "Evaluate"
store_as = "tab"
[tests.operations.args]
expression = "StandardTableau[{2, 1}, {1, 2, 3}]"

[[tests.operations]]
action   = "Evaluate"
store_as = "result"
[tests.operations.args]
expression = "TableauFilling[$tab]"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "$result === {{1, 2}, {3}}"
message   = "Expected: filling == {{1, 2}, {3}}"

[tests.expected]
is_zero         = false
comparison_tier = 1

